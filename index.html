<!doctype html>
<html lang="en">
  <head>
    <script>
      // Try to redefine window.fetch with a no-op setter to prevent TypeError
      try {
        var descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
        if (descriptor && descriptor.configurable) {
          Object.defineProperty(window, 'fetch', {
            get: descriptor.get,
            set: function() { console.log('fetch setter called'); }, // No-op setter
            configurable: true
          });
        }
      } catch (e) {
        console.log('error redefining fetch:', e);
      }

      // Fallback: Suppress the specific error if it occurs
      window.addEventListener('error', (event) => {
        if (event.message && event.message.includes('Cannot set property fetch of #<Window>')) {
          event.preventDefault();
          return false;
        }
      }, true);
      window.onerror = function(message, source, lineno, colno, error) {
        if (message && typeof message === 'string' && message.includes('Cannot set property fetch of #<Window>')) {
          return true;
        }
      };
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KIT GIZMO - Your Trusted USA Marketplace</title>
    <meta name="description" content="Kit Gizmo - Your Trusted USA Marketplace for premium products and services." />
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
